services:
  - type: web
    name: sistema-vendas
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    disks:
      - name: sistema-vendas-data
        mountPath: /var/data
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_FILE
        value: /var/data/db.json
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-vendas-db
          property: connectionString

databases:
  - name: sistema-vendas-db
    plan: free
